name: Every 15 Minutes Activity

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: activity-commit
  cancel-in-progress: false

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update activity log
        run: |
          echo "Activity at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> activity-log.txt

      - name: Commit and Push
        run: |
          git add activity-log.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated activity $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
