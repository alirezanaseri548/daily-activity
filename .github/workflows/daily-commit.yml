name: Every 5 Minutes Activity

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "alirezanaseri548"
          git config user.email "alirezanaseri369@gmail.com"

      - name: Update activity log
        run: |
          echo "Activity at $(date -u)" >> activity-log.txt

      - name: Commit and push
        run: |
          git add activity-log.txt
          git commit -m "chore: automated activity $(date -u)" || echo "Nothing to commit"
          git push
