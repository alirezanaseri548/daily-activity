name: Random GitHub Activity

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  random-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create random activity
        run: |
          echo "$(date): Random activity from GitHub Actions" >> activity.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add activity.log
          git commit -m "Random update from GitHub Actions"
          git push
